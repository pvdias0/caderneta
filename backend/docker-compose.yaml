services:
  db:
    image: postgres:17-alpine
    container_name: caderneta-db
    restart: always
    environment:
      POSTGRES_DB: caderneta
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/caderneta-backup.sql:/docker-entrypoint-initdb.d/01-caderneta-backup.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d caderneta"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: caderneta-api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      API_PORT: 8080
      API_URL: http://localhost:8080/api
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: caderneta
      JWT_SECRET: local-dev-jwt-secret-change-me
      JWT_REFRESH_SECRET: local-dev-refresh-secret-change-me
      JWT_EXPIRE: 24h
      JWT_REFRESH_EXPIRE: 7d
      RATE_LIMIT_WINDOW: 15
      RATE_LIMIT_MAX_REQUESTS: 100
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/api/v1/health >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s

volumes:
  postgres_data:
